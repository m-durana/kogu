<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="description" content="Kogu 古古 - an open-source dictionary for the living Han script: Traditional, Simplified, Cantonese, Japanese." />
    <!-- iOS standalone-PWA launch images: iOS ignores the web-manifest splash, so without these it
         shows a blank (theme-color) screen during the OS launch phase. Device-matched per resolution;
         only picked up when the app is (re)added to the home screen. -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-640x1136.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-750x1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1125x2436.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1170x2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1179x2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1206x2622.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1242x2208.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/splash/apple-splash-828x1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1242x2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1284x2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="/splash/apple-splash-1290x2796.png" />

    <!-- Only the small latin brand fonts are downloaded; CJK uses the system serif (Songti/
         Hiragino on iOS, Noto on Android) so multi-MB CJK font downloads never block startup.
         Loaded non-render-blocking (media=print + onload) so first paint isn't delayed. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    </noscript>
    <title>Kogu 古古 · Han-script dictionary</title>
    <!-- App shell: a static snapshot of the home screen, painted from inline HTML/CSS the instant the
         document loads, so the installed iOS PWA (which cold-starts the webview every launch) isn't a
         black void while the SPA's JS downloads/parses/mounts. It is NON-interactive — purely a
         placeholder that the real app replaces on mount (removed in main.ts). Inline critical CSS keeps
         the bg black from first paint (no white flash). -->
    <style>
      html, body { margin: 0; background: #0b0b0c; color: #ededeb; -webkit-font-smoothing: antialiased; }
      #shell { max-width: 680px; margin: 0 auto;
        padding: calc(1.4rem + env(safe-area-inset-top)) calc(1.35rem + env(safe-area-inset-right)) 0 calc(1.35rem + env(safe-area-inset-left)); }
      #shell .brand { display: inline-flex; align-items: baseline; gap: 0.45rem; margin: 0 0 1rem; }
      #shell .mark { font-family: "Songti SC", "Hiragino Mincho ProN", "Noto Serif CJK SC", "Noto Serif SC", serif;
        font-weight: 500; font-size: 1.4rem; letter-spacing: -0.04em; color: #ededeb; line-height: 1; }
      #shell .word { font-family: "Newsreader", Georgia, "Times New Roman", serif; font-size: 1.05rem; letter-spacing: 0.06em; color: #b4b4ba; line-height: 1; }
      #shell .searchrow { display: flex; gap: 0.4rem; align-items: stretch; margin-bottom: 0.7rem; }
      #shell .field { position: relative; flex: 1; min-width: 0; display: flex; }
      #shell .searchicon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #9c9ca3; display: flex; }
      #shell .fakeinput { width: 100%; padding: 0.6rem 0.9rem 0.6rem 2.4rem; font-size: 1.05rem;
        font-family: "Newsreader", Georgia, serif; color: #9c9ca3; white-space: nowrap; overflow: hidden;
        background: #141416; border: 1px solid #2a2a2e; border-radius: 13px; }
      #shell .rowbtn { flex: none; display: inline-flex; align-items: center; justify-content: center; padding: 0 0.75rem;
        color: #b4b4ba; background: #141416; border: 1px solid #2a2a2e; border-radius: 13px; }
      #shell .intro { padding: 0.4rem 0.2rem; }
      #shell .tag { font-family: "Newsreader", Georgia, serif; font-size: 1.35rem; line-height: 1.5; color: #ededeb; margin: 0 0 0.8rem; }
      #shell .tag b { font-family: "Songti SC", "Hiragino Mincho ProN", "Noto Serif CJK SC", serif; font-weight: 500; }
      #shell .tag2 { color: #9c9ca3; font-size: 0.95rem; line-height: 1.6; margin: 0; max-width: 32ch; }
    </style>
  </head>
  <body>
    <div id="shell" aria-hidden="true">
      <h1 class="brand"><span class="mark">古古</span><span class="word">Kogu</span></h1>
      <div class="searchrow">
        <div class="field">
          <span class="searchicon"><svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></span>
          <div class="fakeinput">character · reading · meaning</div>
        </div>
        <span class="rowbtn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 10 3 3"></path><path d="M6.5 21A3.5 3.5 0 1 0 3 17.5a2.62 2.62 0 0 1-.708 1.792A1 1 0 0 0 3 21z"></path><path d="M9.969 17.031 21.378 5.624a1 1 0 0 0-3.002-3.002L6.967 14.031"></path></svg></span>
        <span class="rowbtn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.997 4a2 2 0 0 1 1.76 1.05l.486.9A2 2 0 0 0 18.003 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1.997a2 2 0 0 0 1.759-1.048l.489-.904A2 2 0 0 1 10.004 4z"></path><circle cx="12" cy="13" r="3"></circle></svg></span>
      </div>
      <div class="intro">
        <p class="tag">One word, read across <b>中文</b> · <b>粵語</b> · <b>日本語</b>.</p>
        <p class="tag2">Type a character, a reading (pinyin · jyutping · kana), or English. Or draw or photograph one.</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
