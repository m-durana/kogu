    <!-- Brand latin fonts (Newsreader, Space Mono) + one consistent CJK serif (Noto Serif SC). Noto is
         served with unicode-range subsetting, so only the glyphs actually shown download, and the whole
         thing is non-render-blocking (media=print + onload) - first paint uses the system serif, then
         swaps to Noto so every CJK glyph (incl. 粵 + Japanese) is one uniform face, not a bold fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&family=Noto+Serif+SC:wght@400;500&family=Noto+Serif+JP:wght@400;500&family=Noto+Serif+TC:wght@400;500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&family=Noto+Serif+SC:wght@400;500&family=Noto+Serif+JP:wght@400;500&family=Noto+Serif+TC:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    </noscript>
    <title>Kogu 古古 · Han-script dictionary</title>
    <!-- Loading screen: a centered brand mark + indeterminate progress bar, painted from inline
         HTML/CSS the instant the document loads, so the installed iOS PWA (which cold-starts the webview
         every launch) shows a loading state instead of a black void while the SPA's JS mounts. Removed
         in main.ts the moment the real app is ready. Inline critical CSS keeps the bg black (no flash). -->
    <style>
      html, body { margin: 0; background: #0b0b0c; color: #ededeb; -webkit-font-smoothing: antialiased; }
      #shell { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 1.2rem; }
      #shell .bm { font-family: "Noto Serif SC", "Songti SC", "Hiragino Mincho ProN", serif;
        font-weight: 500; font-size: 2.6rem; letter-spacing: -0.02em; color: #ededeb; line-height: 1; }
      #shell .bb { width: 116px; height: 2px; background: #2a2a2e; border-radius: 2px; overflow: hidden; }
      #shell .bb span { display: block; height: 100%; width: 45%; background: #b4b4ba; border-radius: 2px;
        animation: kogubar 1.1s ease-in-out infinite; }
      @keyframes kogubar { 0% { transform: translateX(-110%); } 100% { transform: translateX(360%); } }
      @media (prefers-reduced-motion: reduce) { #shell .bb span { animation-duration: 2.4s; } }
    </style>
  </head>
  <body>
    <div id="shell" aria-hidden="true">
      <div class="bm">古古</div>
      <div class="bb"><span></span></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
