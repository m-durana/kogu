<title>Kogu · design directions</title>
<style>
  :root { color-scheme: dark; }

  .bar .grp { font-family: ui-monospace, monospace; font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: #5a5a60; align-self: center; }
  .bar button { font-family: ui-monospace, monospace; font-size: 0.72rem; color: #b4b4ba; background: none; border: 1px solid #2c2c30; border-radius: 100px; padding: 0.34rem 0.7rem; cursor: pointer; transition: .15s; }
  .bar button:hover { color: #fff; border-color: #50505a; }
  .bar button.on { background: #e8e8e6; color: #0a0a0b; border-color: #e8e8e6; }
  iframe { flex: 1; width: 100%; border: 0; background: #000; }
</style>
</head>
<body>
  <div class="bar">
    <span class="ttl">Kogu — mobile UI directions (3 iOS · 2 Android)</span>
    <span class="grp">iOS</span>
    <button data-d="ios1" class="on">Grouped</button>
    <button data-d="ios2">Plain</button>
    <button data-d="ios3">Sheet</button>
    <span class="grp" style="margin-left:.4rem">Android</span>
    <button data-d="mat">Material</button>
    <button data-d="exp">Expressive</button>
  </div>
  <iframe id="frame" title="design preview"></iframe>
