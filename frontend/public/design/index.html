<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kogu · design directions</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100dvh; }
  body { background: #0a0a0b; color: #e8e8e6; font-family: ui-sans-serif, system-ui, sans-serif; display: flex; flex-direction: column; }
  .bar { display: flex; gap: 0.3rem; flex-wrap: wrap; align-items: center; padding: 0.5rem 0.7rem; border-bottom: 1px solid #232327; background: #101012; }
  .bar .ttl { font-family: ui-monospace, monospace; font-size: 0.58rem; letter-spacing: 0.16em; text-transform: uppercase; color: #76767c; width: 100%; margin-bottom: 0.15rem; }
  .bar .grp { font-family: ui-monospace, monospace; font-size: 0.56rem; letter-spacing: 0.12em; text-transform: uppercase; color: #5a5a60; }
  .bar button { font-family: ui-monospace, monospace; font-size: 0.7rem; color: #b4b4ba; background: none; border: 1px solid #2c2c30; border-radius: 100px; padding: 0.3rem 0.65rem; cursor: pointer; transition: .15s; }
  .bar button:hover { color: #fff; border-color: #50505a; }
  .bar button.on { background: #e8e8e6; color: #0a0a0b; border-color: #e8e8e6; }
  .bar.pages { background: #0c0c0e; padding-top: 0.4rem; padding-bottom: 0.4rem; }
  .bar.pages button.on { background: #4a4a52; color: #fff; border-color: #4a4a52; }
  iframe { flex: 1; width: 100%; border: 0; background: #000; }
</style>
</head>
<body>
  <div class="bar" id="designbar">
    <span class="ttl">Kogu — mobile UI directions · 4 real pages × 7 designs (4 iOS · 3 Android)</span>
    <span class="grp">iOS</span>
    <button data-d="ios-grouped" class="on">Editorial</button>
    <button data-d="ios-plain">Clean</button>
    <button data-d="hybrid">Hybrid</button>
    <button data-d="ios-sheet">Sheet</button>
    <span class="grp" style="margin-left:.4rem">Android</span>
    <button data-d="mat">Material</button>
    <button data-d="exp">Expressive</button>
    <button data-d="cmp">Compact</button>
  </div>
  <div class="bar pages" id="pagebar">
    <span class="grp">Page</span>
    <button data-p="list">Search list</button>
    <button data-p="word">Word</button>
    <button data-p="partial">Partial / not found</button>
    <button data-p="char" class="on">Character</button>
  </div>
  <iframe id="frame" title="design preview"></iframe>

<script>
const FONTS = '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;500&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">'
const RESET = '*{box-sizing:border-box;margin:0}body{min-height:100dvh;-webkit-font-smoothing:antialiased}svg{vertical-align:-0.14em}ol,ul{list-style:none;padding:0}@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}'

// monochrome Lucide-style icons (1em → scale with font-size)
const ic = (p, f) => `<svg viewBox="0 0 24 24" width="1em" height="1em" fill="${f?'currentColor':'none'}" stroke="${f?'none':'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`
const SPK   = ic('<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a7 7 0 0 1 0 14.14"/>')
const SHARE = ic('<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>')
const BOOK  = ic('<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>')
const SWAP  = ic('<polyline points="17 11 21 7 17 3"/><line x1="21" y1="7" x2="9" y2="7"/><polyline points="7 21 3 17 7 13"/><line x1="3" y1="17" x2="15" y2="17"/>')
const ARROW = ic('<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>')
const CHEV  = ic('<polyline points="9 18 15 12 9 6"/>')
const CHEVL = ic('<polyline points="15 18 9 12 15 6"/>')
const ARRL  = ic('<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>')
const SEARCH= ic('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>')
const MORE  = ic('<circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/>', true)
const CLOCK = ic('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')
const EXT   = ic('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>')

// a back bar shared by entry pages; the chevron (iOS) / arrow (Android) is chosen by theme CSS
const BACKBTN = `<button class="top-back"><span class="ib-ios">${CHEVL}</span><span class="ib-and">${ARRL}</span></button>`
const ACTS = `<div class="top-acts"><button class="act">${BOOK}</button><button class="act">${SHARE}</button></div>`

/* ══════════════════════ THE FOUR PAGES (shared markup, themed 6 ways) ══════════════════════ */
const PAGES = {}

/* ── PAGE: SEARCH LIST (query "machine", 50 results) ── */
PAGES.list = `
<div class="grab"></div>
<header class="top top-home">
  <div class="brand">古古 <span class="brand-l">Kogu</span></div>
  <div class="top-acts"><button class="act">${CLOCK}</button><button class="act">${BOOK}</button></div>
</header>
<div class="search"><span class="search-ic">${SEARCH}</span><span class="search-q">machine</span></div>
<main class="body">
  <div class="meta">50 results</div>
  <ul class="rows">
    ${[
      ['機','机','ji1','中','简','(bound form) machine; mechanism'],
      ['機械','器械','きかい','日','JP','machine; mechanism'],
      ['機器','机器','ji1 qi4','中','简','machine'],
      ['機械','机械','ji1 xie4','中','简','machine'],
      ['マシン','','mashin','日','JP','machine'],
      ['メカ','','meka','日','JP','mechanism; machines'],
      ['機子','机子','ji1 zi5','中','简','machine'],
      ['整機','整机','zing2 gei1','粵','','to repair a computer; machine'],
    ].map(([g,alt,rd,tag,rg,gl])=>`
    <li class="row">
      <span class="row-gly">${g}</span>
      <span class="row-mid">
        <span class="row-l1">${alt?`<span class="row-alt">${alt}</span>`:''}<span class="row-rd">${rd}</span><span class="row-tags"><span class="row-var">${tag}</span>${rg?`<span class="row-sc">${rg}</span>`:''}</span></span>
        <span class="row-gloss">${gl}</span>
      </span>
      <span class="row-chev">${CHEV}</span>
    </li>`).join('')}
  </ul>
</main>`

/* ── PAGE: WORD (電話) ── */
PAGES.word = `
<div class="grab"></div>
<header class="top">
  ${BACKBTN}<div class="brand">古古 <span class="brand-l">Kogu</span></div>${ACTS}
</header>
<main class="body">
  <div class="head"><div class="head-gly">電話</div><button class="head-swap">${SWAP}</button></div>
  <div class="loanbadge">wasei-kango · borrowed from Japanese</div>
  <div class="dl">
    <div class="dlh"><span class="dl-tag">中</span><span class="dl-formtag">简</span><span class="dl-form">电话</span><span class="dl-rd">diàn huà</span><button class="dl-spk">${SPK}</button><span class="dl-tag2">粵</span><span class="dl-rd">din6 waa2</span><button class="dl-spk">${SPK}</button></div>
    <ol class="senses"><li><span class="sn">1</span>telephone</li><li><span class="sn">2</span>phone call</li><li><span class="sn">3</span>phone number</li></ol>
  </div>
  <div class="dl">
    <div class="dlh"><span class="dl-tag">日</span><span class="dl-jp"><span class="kana">でんわ<span class="rsub">denwa</span></span></span><button class="dl-spk">${SPK}</button><span class="ltag">cognate</span></div>
    <ol class="senses"><li><span class="sn">1</span>telephone call; phone call</li><li><span class="sn">2</span>telephone (device)</li></ol>
  </div>
  <nav class="tabs"><button class="tab on">Characters</button><button class="tab">Related</button><button class="tab">Origin</button></nav>
  <section class="tabpane">
    <ul class="rows tight">
      <li class="row"><span class="row-gly">電</span><span class="row-mid"><span class="row-l1"><span class="row-rd">diàn</span><span class="row-tags"><span class="row-var">中</span><span class="row-var">粵</span><span class="row-var">日</span></span></span><span class="row-gloss">electricity; electric</span></span><span class="row-chev">${CHEV}</span></li>
      <li class="row"><span class="row-gly">話</span><span class="row-mid"><span class="row-l1"><span class="row-rd">huà</span><span class="row-tags"><span class="row-var">中</span><span class="row-var">粵</span><span class="row-var">日</span></span></span><span class="row-gloss">speech; talk; spoken language</span></span><span class="row-chev">${CHEV}</span></li>
    </ul>
  </section>
</main>
<button class="fab">${BOOK}</button>`

/* ── PAGE: PARTIAL / NOT FOUND (中宇大廈) ── */
PAGES.partial = `
<div class="grab"></div>
<header class="top top-home">
  <div class="brand">古古 <span class="brand-l">Kogu</span></div>
  <div class="top-acts"><button class="act">${CLOCK}</button><button class="act">${BOOK}</button></div>
</header>
<div class="search"><span class="search-ic">${SEARCH}</span><span class="search-q">中宇大廈</span></div>
<main class="body">
  <div class="meta">1 result</div>
  <ul class="rows"><li class="row"><span class="row-gly">大廈</span><span class="row-mid"><span class="row-l1"><span class="row-alt">大厦</span><span class="row-rd">dà shà</span><span class="row-tags"><span class="row-var">中</span><span class="row-sc">简</span></span></span><span class="row-gloss">used in names of grand buildings (帝國大廈 = Empire State Building)</span></span><span class="row-chev">${CHEV}</span></li></ul>
  <section class="noword">
    <div class="nw-head"><span class="nw-q">中宇大廈</span><span class="nw-note">characters</span></div>
    <p class="nw-lit"><span class="nw-litk">literally</span> central · house · big · big&nbsp;building</p>
    <ul class="rows">
      ${[['中','央','central'],['宇','','house; eaves; universe'],['大','','big; great; vast'],['廈','厦','big building; mansion']].map(([g,alt,gl])=>`
      <li class="row"><span class="row-gly">${g}</span><span class="row-mid"><span class="row-l1"><span class="row-tags"><span class="row-var">中</span><span class="row-var">粵</span><span class="row-var">日</span></span></span><span class="row-gloss">${gl}</span></span></li>`).join('')}
    </ul>
    <button class="lookup">${EXT} look “中宇大廈” up</button>
  </section>
</main>`

/* ── PAGE: CHARACTER (機, Structure tab) ── */
PAGES.char = `
<div class="grab"></div>
<header class="top">
  ${BACKBTN}<div class="brand">古古 <span class="brand-l">Kogu</span></div>${ACTS}
</header>
<main class="body">
  <div class="head"><div class="head-gly">機</div><button class="head-swap">${SWAP}</button></div>
  <div class="dl">
    <div class="dlh"><span class="dl-tag">中</span><span class="dl-formtag">简</span><span class="dl-form">机</span><span class="dl-rd">jī</span><button class="dl-spk">${SPK}</button><span class="dl-tag2">粵</span><span class="dl-rd">gei1</span><button class="dl-spk">${SPK}</button></div>
    <div class="ltagline"><span class="ltag">often in compounds</span></div>
    <ol class="senses"><li><span class="sn">1</span>machine; mechanism</li><li><span class="sn">2</span>aircraft</li></ol>
  </div>
  <div class="dl">
    <div class="dlh"><span class="dl-tag">日</span><span class="dl-jp"><span class="kana">キ<span class="rsub">ki</span></span><span class="kdot">·</span><span class="kana">はた<span class="rsub">hata</span></span></span><button class="dl-spk">${SPK}</button><button class="dl-more">+</button></div>
    <ol class="senses"><li><span class="sn">1</span>chance; opportunity</li><li><span class="sn">2</span>loom; machine</li></ol>
  </div>
  <nav class="tabs"><button class="tab on">Structure</button><button class="tab">Related</button><button class="tab">Origin</button><button class="tab">Used in</button></nav>
  <section class="tabpane">
    <div class="seclab">Across scripts</div>
    <div class="strip"><span class="sf"><span class="sf-t">繁</span>機</span><span class="sf-arr">${ARROW}</span><span class="sf"><span class="sf-t">简</span>机</span></div>
    <p class="note2">機 and 机 carry the same meaning; 机 is the simplified Chinese form (PRC&nbsp;simplification).</p>
    <div class="seclab">What it's made of</div>

    <p class="phonowhy">In Middle Chinese 機 and 幾 both read <b class="mc">kj+j</b>, so 幾 clearly lent the&nbsp;sound.</p>
    <div class="strokes">16 strokes · ⿰木幾</div>
  </section>
</main>
<button class="fab">${BOOK}</button>`

/* ══════════════════════ BASE + 6 THEMES (var-driven; glyph-hero, readings quiet) ══════════════════════ */
const CSS = `

.app{min-height:100dvh;background:var(--bg);position:relative;animation:up .4s both}
.body{padding:0 var(--mx) 6rem}
.grab{display:none}
.top{display:flex;align-items:center;gap:.4rem;padding:.7rem var(--mx);background:var(--topbg);position:sticky;top:0;z-index:5;backdrop-filter:var(--topblur);-webkit-backdrop-filter:var(--topblur);border-bottom:var(--topline)}
.brand{font-family:var(--han);font-weight:500;font-size:1.35rem;color:var(--txt);letter-spacing:-.02em}

.lookup{display:inline-flex;align-items:center;gap:.4rem;margin:1rem 0 0;font-family:var(--mono);font-size:.68rem;color:var(--txt2);background:none;border:1px solid var(--line2);border-radius:var(--field-r);padding:.45rem .8rem;cursor:pointer}
.fab{display:none}

/* defaults (overridden per theme); type/density/shape are now per-design levers, not just color */
body{--ui:system-ui,sans-serif;--han:"Noto Serif SC",serif;--mono:"Space Mono",ui-monospace,monospace;
  --body-font:var(--ui);--gly-font:var(--han);--gly:clamp(3.2rem,17vw,4.6rem);--gly-w:500;--gly-ls:0;
  --sense:1rem;--lh:1.45;--dpad:.7rem;--head-pad:1rem;
  --page:#000;--bg:#000;--txt:#fff;--txt2:rgba(235,235,245,.6);--txt3:rgba(235,235,245,.32);
  --line:#222;--line2:#3a3a40;--topbg:transparent;--topblur:none;--topline:none;--field:#1c1c1e;--field-r:18px;--mx:1rem}

/* ════ iOS shared (SF) ════ */
body.ios-grouped,body.ios-plain,body.ios-sheet,body.hybrid{--ui:-apple-system,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
  --page:#000;--bg:#000;--txt:#fff;--txt2:rgba(235,235,245,.6);--txt3:rgba(235,235,245,.3);--line2:#3a3a3c}

/* iOS · EDITORIAL — serif-forward, airy, flat with hairlines, big light display glyph (magazine) */
body.ios-grouped{--body-font:"Newsreader",Georgia,serif;--gly:clamp(4rem,21vw,5.8rem);--gly-w:400;--gly-ls:.01em;
  --sense:1.2rem;--lh:1.6;--dpad:1rem;--head-pad:1.3rem;--line:rgba(84,84,88,.4);
  --topbg:rgba(0,0,0,.5);--topblur:blur(20px) saturate(1.6)}
body.ios-grouped .brand-l{font-style:italic}
body.ios-grouped .tabs{gap:1.7rem;border-bottom:.5px solid rgba(84,84,88,.5)}
body.ios-grouped .tab{flex:0 0 auto;font-family:"Newsreader",serif;font-size:1.1rem;padding:.7rem 0}
body.ios-grouped .tab.on{font-weight:500}
body.ios-grouped .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-.5px;height:1.5px;background:#fff}
body.ios-grouped .seclab{font-family:"Newsreader",serif;font-style:italic;text-transform:none;letter-spacing:.01em;font-size:1rem;color:var(--txt2)}
body.ios-grouped .note2,body.ios-grouped .phonowhy{font-size:1.02rem}

/* iOS · CLEAN — canonical SF system look, flat edge-to-edge, underline tabs, medium density */
body.ios-plain{--line:rgba(84,84,88,.5);--topbg:rgba(18,18,20,.55);--topblur:blur(22px) saturate(1.6);
  --topline:.5px solid rgba(84,84,88,.6);--gly:clamp(2.8rem,14vw,3.8rem)}
body.ios-plain .tabs{border-bottom:.5px solid rgba(84,84,88,.6);gap:1.4rem}
body.ios-plain .tab{flex:0 0 auto;padding:.75rem 0;font-size:.95rem}
body.ios-plain .tab.on{font-weight:600}
body.ios-plain .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-.5px;height:2px;background:#fff;border-radius:2px}

/* iOS · SHEET — spatial card world: grabber, glyph tile, rounded cards everywhere, pill tabs */
body.ios-sheet{--page:#000;--bg:#1C1C1E;--line:rgba(84,84,88,.45);--field:#2C2C2E;--dpad:.85rem;--sense:1.05rem;--gly:clamp(3rem,15vw,4rem)}
body.ios-sheet .app{border-radius:16px 16px 0 0;margin-top:1.6rem;min-height:96dvh}
body.ios-sheet .grab{display:block;width:36px;height:5px;border-radius:3px;background:rgba(235,235,245,.3);margin:.5rem auto 0}
body.ios-sheet .top{background:transparent;border:none}
body.ios-sheet .head-gly{background:#2C2C2E;border-radius:20px;padding:.45rem 1rem;line-height:1}
body.ios-sheet .dl{background:#2C2C2E;border-radius:16px;padding:.85rem 1rem;margin-top:.6rem;border:none}
body.ios-sheet .tabpane{background:#2C2C2E;border-radius:16px;padding:1rem 1.1rem;margin-top:.7rem}
body.ios-sheet .tabs{background:rgba(118,118,128,.24);border-radius:18px;padding:2px;margin-top:1.3rem}
body.ios-sheet .tab{border-radius:16px;font-size:.82rem;padding:.5rem .2rem}
body.ios-sheet .tab.on{background:#636366;box-shadow:0 1px 3px rgba(0,0,0,.35)}
body.ios-sheet .tabpane .rows .row{border-top-color:rgba(84,84,88,.4)}

/* iOS · HYBRID — Editorial's airy layout & coloring, but Clean's SF type (font + sizes) */
body.hybrid{--gly:clamp(2.8rem,14vw,3.8rem);--dpad:1rem;--head-pad:1.3rem;--line:rgba(84,84,88,.4);
  --topbg:rgba(0,0,0,.5);--topblur:blur(20px) saturate(1.6)}
body.hybrid .tabs{gap:1.7rem;border-bottom:.5px solid rgba(84,84,88,.5)}
body.hybrid .tab{flex:0 0 auto;font-size:.95rem;padding:.7rem 0}
body.hybrid .tab.on{font-weight:600}
body.hybrid .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-.5px;height:1.5px;background:#fff}

/* ════ Android shared (Roboto, Material 3 neutral tonal, white = primary) ════ */
body.mat,body.exp,body.cmp{--ui:"Roboto",system-ui,sans-serif;
  --page:#0F0F0F;--bg:#0F0F0F;--txt:#E3E3E3;--txt2:#C7C7C7;--txt3:#8e8e8e;--line:#262626;--line2:#484848;--field:#1E1E1E;--field-r:28px}

/* Android · MATERIAL — standard M3: app bar, underline indicator, medium density, FAB */
body.mat{--topbg:#1E1E1E;--gly:clamp(3rem,15vw,4rem)}
body.mat .top{gap:.2rem}
body.mat .brand{flex:1}
body.mat .tabs{border-bottom:1px solid #484848}
body.mat .tab{font-weight:500;font-size:.82rem;padding:.85rem .2rem}
body.mat .tab.on::after{content:"";position:absolute;left:18%;right:18%;bottom:0;height:3px;border-radius:3px 3px 0 0;background:#fff}
body.mat .ib-ios{display:none}body.mat .ib-and{display:inline-flex}
body.mat .fab{display:flex;position:fixed;right:max(16px,calc(50% - 260px + 16px));bottom:16px;width:56px;height:56px;border-radius:16px;background:#484848;color:#E3E3E3;align-items:center;justify-content:center;font-size:22px;border:none;box-shadow:0 4px 10px rgba(0,0,0,.5)}

/* Android · EXPRESSIVE — bold/maximalist: oversized type, extra-large 28px shapes, heavy, generous */
body.exp{--bg:#0F0F0F;--line:transparent;--gly:clamp(4rem,20vw,5.6rem);--gly-w:500;
  --sense:1.15rem;--lh:1.6;--dpad:1rem;--head-pad:1.2rem}
body.exp .top{background:#1E1E1E;border-radius:0 0 28px 28px;padding-bottom:1.2rem}
body.exp .brand{font-size:1.6rem}
body.exp .ib-ios{display:none}body.exp .ib-and{display:inline-flex}
body.exp .dl{background:#1A1A1A;border-radius:28px;padding:1.1rem 1.3rem;margin-top:.8rem;border:none}
body.exp .tabs{border:1px solid #919191;border-radius:50px;overflow:hidden;margin-top:1.6rem}
body.exp .tab{border-right:1px solid #484848;font-weight:600;font-size:.82rem;padding:.7rem .2rem}
body.exp .tab:last-child{border-right:none}
body.exp .tab.on{background:#484848}
body.exp .tabpane{background:#1A1A1A;border-radius:28px;padding:1.3rem 1.4rem;margin-top:.9rem}
body.exp .tabpane .rows .row{border-top-color:#2a2a2a}
body.exp .fab{display:inline-flex;position:fixed;right:max(16px,calc(50% - 260px + 16px));bottom:16px;align-items:center;gap:.5rem;height:56px;padding:0 1.3rem;border-radius:16px;background:#E3E3E3;color:#000;font-size:.85rem;font-weight:600;border:none;box-shadow:0 4px 12px rgba(0,0,0,.55)}
body.exp .fab::after{content:"Save"}

/* Android · COMPACT — dense/utilitarian: small type, tight rhythm, square-ish, mono accents */
body.cmp{--topbg:#161616;--mx:.85rem;--gly:clamp(2.4rem,12vw,3.1rem);--sense:.9rem;--lh:1.35;--dpad:.42rem;--head-pad:.6rem;--field-r:8px}
body.cmp .top{padding-top:.5rem;padding-bottom:.5rem;gap:.2rem}
body.cmp .brand{flex:1;font-size:1.15rem}
body.cmp .row-gly{font-size:1.4rem;min-width:1.8em}
body.cmp .dl-tag,body.cmp .dl-tag2{font-size:1rem}
body.cmp .seclab{font-size:.56rem;letter-spacing:.16em}
body.cmp .ib-ios{display:none}body.cmp .ib-and{display:inline-flex}
body.cmp .tabs{border-bottom:1px solid #333;margin-top:.9rem}
body.cmp .tab{font-size:.74rem;font-weight:500;padding:.55rem .15rem}
body.cmp .tab.on::after{content:"";position:absolute;left:10%;right:10%;bottom:0;height:2px;background:#fff}
`

const designs = ['ios-grouped','ios-plain','hybrid','ios-sheet','mat','exp','cmp']
let curD = 'ios-grouped', curP = 'char'
const frame = document.getElementById('frame')
function render(){
  frame.srcdoc = '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    + FONTS + '<style>' + RESET + CSS + '</style></head><body class="' + curD + '"><div class="app">' + PAGES[curP] + '</div></body></html>'
  document.querySelectorAll('#designbar button').forEach(b => b.classList.toggle('on', b.dataset.d === curD))
  document.querySelectorAll('#pagebar button').forEach(b => b.classList.toggle('on', b.dataset.p === curP))
}
document.querySelectorAll('#designbar button').forEach(b => b.addEventListener('click', () => { curD = b.dataset.d; render() }))
document.querySelectorAll('#pagebar button').forEach(b => b.addEventListener('click', () => { curP = b.dataset.p; render() }))
render()
</script>
</body>
