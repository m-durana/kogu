# /etc/nginx/sites-available/kogu.miro.build.conf
# Kogu 古古 dictionary — served at kogu.miro.build.
# Static Svelte SPA from /var/www/miro/kogu ; /api/* -> kogu.service (Rust) on 127.0.0.1:4100.
# DNS-only at Cloudflare (gray cloud). Rate-limit zones in /etc/nginx/conf.d/kogu-ratelimit.conf.

# --- HTTP: allow ACME, redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name kogu.miro.build;

    include /etc/nginx/snippets/acme.conf;
    include /etc/nginx/snippets/deny-dotfiles.conf;

    location / {
        return 301 https://kogu.miro.build$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kogu.miro.build;

    ssl_certificate      /etc/letsencrypt/live/kogu.miro.build/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/kogu.miro.build/privkey.pem;
    include /etc/nginx/snippets/ssl-common.conf;

    include /etc/nginx/snippets/acme.conf;
    include /etc/nginx/snippets/deny-dotfiles.conf;

    charset utf-8;
    root /var/www/miro/kogu;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /favicon.ico {
        try_files /favicon.ico @miro_default_favicon;
    }
    include /etc/nginx/snippets/default-favicon.conf;

    location = /manifest.webmanifest { default_type application/manifest+json; }
    location = /sw.js { add_header Cache-Control "no-cache"; }

    # Handwriting proxy: tighter limit (it forwards to Google). Must precede the /api/ block.
    location = /api/recognize {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://127.0.0.1:4100/recognize;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=kogu_recognize burst=5 nodelay;
    }

    # OCR: image upload (larger body) + longer timeout for CPU inference. Precedes /api/.
    location = /api/ocr {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://127.0.0.1:4100/ocr;
        proxy_http_version 1.1;
        client_max_body_size 14m;
        proxy_read_timeout 60s;
        limit_req zone=kogu_recognize burst=4 nodelay;
    }

    # API -> Rust backend (routes live at the root, so strip the /api prefix).
    location ^~ /api/ {
        # read-only, keyless, public data: allow any origin so third-party browser apps can call it.
        # GET-only with no credentials, so "*" leaks nothing; preflight is answered here at the edge.
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }

        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=kogu_search burst=20 nodelay;
    }

    # Built static assets are content-hashed -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback. index.html must revalidate so a deploy propagates immediately - the hashed
    # /assets/ stay immutable, but the HTML referencing them can't be stale-cached or users keep
    # running an old build.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
