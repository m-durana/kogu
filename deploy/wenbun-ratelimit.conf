# http-context rate-limit zones for wenbun. Install to /etc/nginx/conf.d/wenbun-ratelimit.conf
# (limit_req_zone must live in the http{} context, not a server block).
limit_req_zone $binary_remote_addr zone=wenbun_search:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=wenbun_recognize:10m rate=2r/s;
