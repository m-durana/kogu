# http-context rate-limit zones for kogu. Install to /etc/nginx/conf.d/kogu-ratelimit.conf
# (limit_req_zone must live in the http{} context, not a server block).
limit_req_zone $binary_remote_addr zone=kogu_search:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=kogu_recognize:10m rate=2r/s;
