# /etc/nginx/sites-available/wenbun.miro.build.conf
# Wenbun 文文 dictionary — served at wenbun.miro.build.
# Static Svelte SPA from /var/www/miro/wenbun ; /api/* -> wenbun.service (Rust) on 127.0.0.1:4100.
# DNS-only at Cloudflare (gray cloud). Rate-limit zones in /etc/nginx/conf.d/wenbun-ratelimit.conf.

# --- HTTP: allow ACME, redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name wenbun.miro.build;

    include /etc/nginx/snippets/acme.conf;
    include /etc/nginx/snippets/deny-dotfiles.conf;

    location / {
        return 301 https://wenbun.miro.build$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wenbun.miro.build;

    ssl_certificate      /etc/letsencrypt/live/wenbun.miro.build/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/wenbun.miro.build/privkey.pem;
    include /etc/nginx/snippets/ssl-common.conf;

    include /etc/nginx/snippets/acme.conf;
    include /etc/nginx/snippets/deny-dotfiles.conf;

    charset utf-8;
    root /var/www/miro/wenbun;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /favicon.ico {
        try_files /favicon.ico @miro_default_favicon;
    }
    include /etc/nginx/snippets/default-favicon.conf;

    # Handwriting proxy: tighter limit (it forwards to Google). Must precede the /api/ block.
    location = /api/recognize {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://127.0.0.1:4100/recognize;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=wenbun_recognize burst=5 nodelay;
    }

    # API -> Rust backend (routes live at the root, so strip the /api prefix).
    location ^~ /api/ {
        include /etc/nginx/snippets/proxy_headers.conf;
        proxy_pass http://127.0.0.1:4100/;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        limit_req zone=wenbun_search burst=20 nodelay;
    }

    # Built static assets are content-hashed -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
